name: trustyclaw-stage-stop

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trustyclaw-stage
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize stage stop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Authorize repo admin
        uses: ./.github/actions/authorize-repo-admin

      - name: Require main dispatch
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${DISPATCH_REF}" != "refs/heads/main" ]]; then
            echo "Stage stop can only be dispatched from main; selected ${DISPATCH_REF}." >&2
            exit 1
          fi

  stop-stage:
    needs: authorize
    name: Stop stage instance
    if: ${{ needs.authorize.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Stop stage EC2 instance
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          cat > stage_config.json <<JSON
          {
            "agent_name": "trustyclaw-stage",
            "aws_region": "us-east-1",
            "aws_access_key_id_env": "AWS_ACCESS_KEY_ID",
            "aws_secret_access_key_env": "AWS_SECRET_ACCESS_KEY"
          }
          JSON
          if python3 -m host.cli.stop --config stage_config.json --result-file trustyclaw-stage-stop.json; then
            result="stopped"
          else
            result="failed"
            {
              echo "## TrustyClaw stage stop"
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Result | ${result} |"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          instance_id="$(jq -r '.instance_id // "n/a"' trustyclaw-stage-stop.json)"
          initial_state="$(jq -r '.initial_state // "n/a"' trustyclaw-stage-stop.json)"
          final_state="$(jq -r '.state // "n/a"' trustyclaw-stage-stop.json)"
          {
            echo "## TrustyClaw stage stop"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${result} |"
            echo "| Instance | ${instance_id} |"
            echo "| Initial state | ${initial_state} |"
            echo "| Final state | ${final_state} |"
            echo "| Note | Stage instance is stopped; preserved EBS volumes were not deleted. |"
          } >> "${GITHUB_STEP_SUMMARY}"
