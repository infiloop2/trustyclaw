name: trustyclaw-smoke

on:
  workflow_dispatch:
  issue_comment:
    types:
      - created

permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read
  statuses: write

jobs:
  authorize:
    name: Authorize AWS smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request && github.event.comment.body == '/smoke')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Authorize repo admin
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ./.github/actions/authorize-repo-admin

      - name: Resolve safe ref
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SHA: ${{ github.sha }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "issue_comment" ]]; then
            pr="$(curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${{ github.api_url }}/repos/${REPO}/pulls/${ISSUE_NUMBER}")"
            head_repo="$(jq -r .head.repo.full_name <<<"${pr}")"
            if [[ "${head_repo}" != "${REPO}" ]]; then
              echo "Refusing to run AWS smoke secrets against fork PR code from ${head_repo}." >&2
              exit 1
            fi
            ref="$(jq -r .head.sha <<<"${pr}")"
          else
            ref="${DISPATCH_SHA}"
          fi
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "Testing ref ${ref}"

      - name: Reject when smoke is already active
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          REF: ${{ steps.resolve.outputs.ref }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          active_json="$(mktemp)"
          jq -n '{workflow_runs: []}' > "${active_json}"
          for status in queued in_progress; do
            page="$(curl -fsS --get \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              --data-urlencode "per_page=100" \
              --data-urlencode "status=${status}" \
              "${{ github.api_url }}/repos/${REPO}/actions/workflows/trustyclaw-smoke.yml/runs")"
            jq -s '{workflow_runs: (.[0].workflow_runs + .[1].workflow_runs)}' "${active_json}" <(printf '%s' "${page}") > "${active_json}.next"
            mv "${active_json}.next" "${active_json}"
          done
          active_run="$(jq -r --arg current "${CURRENT_RUN_ID}" '
            .workflow_runs
            | map(select((.id | tostring) != $current))
            | sort_by(.created_at)
            | reverse
            | .[0]
            | if . == null then "" else "\(.id) \(.html_url)" end
          ' "${active_json}")"
          if [[ -n "${active_run}" ]]; then
            active_id="${active_run%% *}"
            active_url="${active_run#* }"
            description="Fresh AWS smoke is already running; wait for the previous smoke to complete."
            echo "${description}" >&2
            echo "Active smoke run: ${active_url}" >&2
            payload="$(jq -n \
              --arg state failure \
              --arg context trustyclaw-smoke \
              --arg description "${description}" \
              --arg target_url "${TARGET_URL}" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}')"
            curl -fsS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${{ github.api_url }}/repos/${REPO}/statuses/${REF}" \
              -d "${payload}" >/dev/null
            {
              echo "## TrustyClaw smoke rejected"
              echo
              echo "Fresh AWS smoke is already running. Wait for the previous smoke to complete, then comment \`/smoke\` again."
              echo
              echo "Active run: ${active_url}"
              echo "Active run id: ${active_id}"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          echo "No active trustyclaw-smoke run is currently queued or in progress."

      - name: Rate limit live AWS runs
        uses: ./.github/actions/rate-limit-live-aws-runs
        with:
          workflow-file: trustyclaw-smoke.yml
          authorized-job-name: Authorize AWS smoke

  smoke:
    needs: authorize
    name: Fresh AWS smoke (${{ needs.authorize.outputs.ref }})
    if: ${{ needs.authorize.result == 'success' }}
    runs-on: ubuntu-latest
    concurrency:
      group: trustyclaw-smoke
      cancel-in-progress: false
    timeout-minutes: 90
    steps:
      - name: Mark smoke pending
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ needs.authorize.outputs.ref }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --arg state pending \
            --arg context trustyclaw-smoke \
            --arg description "Fresh AWS smoke is running." \
            --arg target_url "${TARGET_URL}" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${REPO}/statuses/${REF}" \
            -d "${payload}" >/dev/null
          {
            echo "## TrustyClaw smoke"
            echo
            echo "Testing resolved ref: \`${REF}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      # This step has no AWS credential environment. Install the pinned driver
      # before the credential-bearing smoke step, and use the runner's existing
      # Chrome so no browser binary is downloaded alongside AWS secrets.
      - name: Install pinned Playwright driver
        shell: bash
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/trustyclaw-smoke-venv"
          "${RUNNER_TEMP}/trustyclaw-smoke-venv/bin/python" -m pip install \
            --disable-pip-version-check \
            --no-cache-dir \
            'playwright==1.60.0'

      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ needs.authorize.outputs.ref }}
          persist-credentials: false

      - name: Run fresh smoke
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_SMOKE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_SMOKE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          "${RUNNER_TEMP}/trustyclaw-smoke-venv/bin/python" tests/smoke/smoke_aws.py

      - name: Mark smoke result
        if: ${{ always() }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          REF: ${{ needs.authorize.outputs.ref }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          case "${JOB_STATUS}" in
            success)
              state=success
              description="Fresh AWS smoke passed."
              ;;
            cancelled)
              state=error
              description="Fresh AWS smoke was cancelled."
              ;;
            *)
              state=failure
              description="Fresh AWS smoke failed."
              ;;
          esac
          payload="$(jq -n \
            --arg state "${state}" \
            --arg context trustyclaw-smoke \
            --arg description "${description}" \
            --arg target_url "${TARGET_URL}" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl -fsS \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${REPO}/statuses/${REF}" \
            -d "${payload}" >/dev/null
