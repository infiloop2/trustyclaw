name: trustyclaw-stage

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Which stage test suite to run
        type: choice
        default: all
        options:
          - all
          - brave_search
          - gmail
          - google_calendar
          - ibkr
          - instagram
          - instagram_discovery
          - linkedin
          - linkedin_discovery
          - polymarket
          - runway
          - twitter
          - claude
          - codex
          - github

permissions:
  actions: read
  contents: read

concurrency:
  group: trustyclaw-stage
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize AWS stage
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.main_ref.outputs.ref }}
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Authorize repo admin
        uses: ./.github/actions/authorize-repo-admin

      - name: Require main dispatch
        id: main_ref
        shell: bash
        env:
          DISPATCH_SHA: ${{ github.sha }}
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${DISPATCH_REF}" != "refs/heads/main" ]]; then
            echo "TrustyClaw stage may only be dispatched from main; got ${DISPATCH_REF}." >&2
            exit 1
          fi
          ref="${DISPATCH_SHA}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "Deploying ref ${ref} to trustyclaw-stage"
          {
            echo "## TrustyClaw stage authorization"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Event | workflow_dispatch |"
            echo "| Branch | main |"
            echo "| Ref | ${ref} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Rate limit live AWS runs
        uses: ./.github/actions/rate-limit-live-aws-runs
        with:
          workflow-file: trustyclaw-stage.yml
          authorized-job-name: Authorize AWS stage

  stage:
    needs: authorize
    name: Upgrade stage and run tests
    if: ${{ needs.authorize.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: ${{ needs.authorize.outputs.ref }}
          persist-credentials: false

      - name: Prepare stage SSH key and config
        shell: bash
        env:
          TRUSTYCLAW_STAGE_SSH_PRIVATE_KEY: ${{ secrets.TRUSTYCLAW_STAGE_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          install -m 0700 -d "${RUNNER_TEMP}/trustyclaw-stage"
          key_path="${RUNNER_TEMP}/trustyclaw-stage/operator_key"
          printf '%s\n' "${TRUSTYCLAW_STAGE_SSH_PRIVATE_KEY}" > "${key_path}"
          chmod 0600 "${key_path}"
          public_key="$(ssh-keygen -y -f "${key_path}")"
          echo "TRUSTYCLAW_STAGE_SSH_KEY=${key_path}" >> "${GITHUB_ENV}"
          echo "TRUSTYCLAW_STAGE_SSH_PUBLIC_KEY=${public_key}" >> "${GITHUB_ENV}"

      - name: Upgrade stage
        id: upgrade_stage
        continue-on-error: true
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          version="$(cat VERSION)"
          same_version_failure=false
          if ! python3 -m host.cli.upgrade \
            --agent-name trustyclaw-stage \
            > trustyclaw-stage.json 2> >(tee stage-upgrade.log >&2); then
            if grep -F "tagged with version ${version}; upgrade requires preserved state older than target VERSION ${version}" stage-upgrade.log >/dev/null \
              || grep -F "upgrade requires admin state version lower than local VERSION; state=${version}, local=${version}" stage-upgrade.log >/dev/null; then
              same_version_failure=true
            fi
            echo "same_version_failure=${same_version_failure}" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
          echo "same_version_failure=false" >> "${GITHUB_OUTPUT}"

      - name: Start existing stage
        if: ${{ steps.upgrade_stage.outcome == 'failure' && steps.upgrade_stage.outputs.same_version_failure == 'true' }}
        id: start_current
        continue-on-error: true
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          python3 -m host.cli.start \
            --agent-name trustyclaw-stage \
            > trustyclaw-stage.json

      - name: Recover or first-deploy stage
        id: deploy
        if: ${{ steps.upgrade_stage.outcome == 'failure' && steps.start_current.outcome != 'success' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          TRUSTYCLAW_STAGE_ADMIN_PASSWORD: ${{ secrets.TRUSTYCLAW_STAGE_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          # If upgrade failed and no already-current instance was found,
          # recover recreates one from preserved volumes. Deploy is only for
          # the first stage run.
          if ! python3 -m host.cli.recover \
            --agent-name trustyclaw-stage \
            --allow-upgrade \
            > trustyclaw-stage.json; then
            admin_password_sha256="$(printf %s "$TRUSTYCLAW_STAGE_ADMIN_PASSWORD" | sha256sum | cut -d' ' -f1)"
            python3 -m host.cli.deploy \
              --agent-name trustyclaw-stage \
              --operator-ssh-public-key "$TRUSTYCLAW_STAGE_SSH_PUBLIC_KEY" \
              --admin-password-sha256 "$admin_password_sha256" \
              > trustyclaw-stage.json
          fi

      - name: Run stage tests
        id: stage_tests
        shell: bash
        env:
          AWS_DEFAULT_REGION: us-east-1
          TRUSTYCLAW_STAGE_ADMIN_PASSWORD: ${{ secrets.TRUSTYCLAW_STAGE_ADMIN_PASSWORD }}
          STAGE_SUITE: ${{ inputs.suite }}
          STAGE_GITHUB_WRITE_REPO: ${{ secrets.TRUSTYCLAW_STAGE_GITHUB_WRITE_REPO }}
          STAGE_GITHUB_APP_ID: ${{ secrets.TRUSTYCLAW_STAGE_GITHUB_APP_ID }}
          STAGE_GITHUB_APP_INSTALLATION_ID: ${{ secrets.TRUSTYCLAW_STAGE_GITHUB_APP_INSTALLATION_ID }}
          STAGE_GITHUB_APP_PRIVATE_KEY: ${{ secrets.TRUSTYCLAW_STAGE_GITHUB_APP_PRIVATE_KEY }}
          # Each bundled tool is an individual suite. Enable-only config keys
          # use the uniform TRUSTYCLAW_STAGE_<KEY> secret name. OAuth tools use
          # only the enabled, configured, connected state already stored on the
          # persistent stage host. The all suite requires and runs every tool.
          # See docs/development/persistent-aws-stage.md.
          TRUSTYCLAW_STAGE_BRAVE_SEARCH_API_KEY: ${{ secrets.TRUSTYCLAW_STAGE_BRAVE_SEARCH_API_KEY }}
          TRUSTYCLAW_STAGE_IBKR_OAUTH_CONSUMER_KEY: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_OAUTH_CONSUMER_KEY }}
          TRUSTYCLAW_STAGE_IBKR_OAUTH_ACCESS_TOKEN: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_OAUTH_ACCESS_TOKEN }}
          TRUSTYCLAW_STAGE_IBKR_OAUTH_ACCESS_TOKEN_SECRET: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_OAUTH_ACCESS_TOKEN_SECRET }}
          TRUSTYCLAW_STAGE_IBKR_SIGNATURE_KEY: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_SIGNATURE_KEY }}
          TRUSTYCLAW_STAGE_IBKR_ENCRYPTION_KEY: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_ENCRYPTION_KEY }}
          TRUSTYCLAW_STAGE_IBKR_DH_PRIME: ${{ secrets.TRUSTYCLAW_STAGE_IBKR_DH_PRIME }}
          TRUSTYCLAW_STAGE_SCRAPECREATORS_API_KEY: ${{ secrets.TRUSTYCLAW_STAGE_SCRAPECREATORS_API_KEY }}
          TRUSTYCLAW_STAGE_SERPAPI_API_KEY: ${{ secrets.TRUSTYCLAW_STAGE_SERPAPI_API_KEY }}
          TRUSTYCLAW_STAGE_RUNWAY_API_SECRET: ${{ secrets.TRUSTYCLAW_STAGE_RUNWAY_API_SECRET }}
        run: |
          set -euo pipefail
          python3 tests/stage/stage_aws.py \
            --result-file trustyclaw-stage.json \
            --ssh-key-env TRUSTYCLAW_STAGE_SSH_KEY \
            --admin-password-env TRUSTYCLAW_STAGE_ADMIN_PASSWORD \
            --suite "${STAGE_SUITE:-all}" 2>&1 | tee stage-test.log

      - name: Stop stage instance
        id: stop_stage
        if: ${{ always() }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          instance_id="$(jq -r '.instance_id // empty' trustyclaw-stage.json 2>/dev/null || true)"
          if [[ -z "${instance_id}" ]]; then
            echo "No stage result file found; nothing to stop."
            exit 0
          fi
          python3 -m host.cli.stop \
            --agent-name trustyclaw-stage \
            > trustyclaw-stage-stop.json

      - name: Write stage summary
        if: ${{ always() }}
        shell: bash
        env:
          UPGRADE_OUTCOME: ${{ steps.upgrade_stage.outcome }}
          START_OUTCOME: ${{ steps.start_current.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          TEST_OUTCOME: ${{ steps.stage_tests.outcome }}
          STOP_OUTCOME: ${{ steps.stop_stage.outcome }}
          TRUSTYCLAW_STAGE_REF: ${{ needs.authorize.outputs.ref }}
          STAGE_SUITE: ${{ inputs.suite }}
        run: |
          set -euo pipefail
          instance_id="n/a"
          public_dns="n/a"
          public_ip="n/a"
          region="us-east-1"
          if [[ -f trustyclaw-stage.json ]]; then
            instance_id="$(jq -r '.instance_id // "n/a"' trustyclaw-stage.json)"
            public_dns="$(jq -r '.public_dns // "n/a"' trustyclaw-stage.json)"
            public_ip="$(jq -r '.public_ip // "n/a"' trustyclaw-stage.json)"
            region="$(jq -r '.region // "us-east-1"' trustyclaw-stage.json)"
          fi
          test_result="not available"
          if [[ -f stage-test.log ]]; then
            test_result="$(grep -E '^[0-9]+/[0-9]+ checks passed$' stage-test.log | tail -n 1 || true)"
            if [[ -z "${test_result}" ]]; then
              test_result="no final check count found"
            fi
          fi

          {
            echo "## TrustyClaw stage"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Ref | ${TRUSTYCLAW_STAGE_REF:-n/a} |"
            echo "| Suite | ${STAGE_SUITE:-all} |"
            echo "| Region | ${region} |"
            echo "| Instance | ${instance_id} |"
            echo "| Public DNS | ${public_dns} |"
            echo "| Public IP | ${public_ip} |"
            echo "| Upgrade | ${UPGRADE_OUTCOME:-skipped} |"
            echo "| Start existing instance | ${START_OUTCOME:-skipped} |"
            echo "| Recover/deploy | ${DEPLOY_OUTCOME:-skipped} |"
            echo "| Tests | ${TEST_OUTCOME:-skipped} |"
            echo "| Test result | ${test_result} |"
            echo "| Stop instance | ${STOP_OUTCOME:-skipped} |"
          } >> "${GITHUB_STEP_SUMMARY}"
