name: trustyclaw-stage-start

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: trustyclaw-stage
  cancel-in-progress: false

jobs:
  authorize:
    name: Authorize stage start
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Authorize repo admin
        uses: ./.github/actions/authorize-repo-admin

      - name: Require main dispatch
        shell: bash
        env:
          DISPATCH_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${DISPATCH_REF}" != "refs/heads/main" ]]; then
            echo "Stage start can only be dispatched from main; selected ${DISPATCH_REF}." >&2
            exit 1
          fi

  start-stage:
    needs: authorize
    name: Start stage instance
    if: ${{ needs.authorize.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted workflow actions
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          ref: main
          persist-credentials: false

      - name: Start stage EC2 instance
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TRUSTYCLAW_STAGE_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TRUSTYCLAW_STAGE_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -euo pipefail
          cat > stage_config.json <<JSON
          {
            "agent_name": "trustyclaw-stage",
            "aws_region": "us-east-1",
            "aws_access_key_id_env": "AWS_ACCESS_KEY_ID",
            "aws_secret_access_key_env": "AWS_SECRET_ACCESS_KEY"
          }
          JSON
          if python3 -m host.cli.start --config stage_config.json --result-file trustyclaw-stage.json; then
            result="running"
          else
            result="failed"
            {
              echo "## TrustyClaw stage start"
              echo
              echo "| Field | Value |"
              echo "| --- | --- |"
              echo "| Result | ${result} |"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi
          instance_id="$(jq -r '.instance_id // "n/a"' trustyclaw-stage.json)"
          initial_state="$(jq -r '.initial_state // "n/a"' trustyclaw-stage.json)"
          final_state="$(jq -r '.state // "n/a"' trustyclaw-stage.json)"
          public_dns="$(jq -r '.public_dns // "n/a"' trustyclaw-stage.json)"
          public_ip="$(jq -r '.public_ip // "n/a"' trustyclaw-stage.json)"
          {
            echo "## TrustyClaw stage start"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Result | ${result} |"
            echo "| Instance | ${instance_id} |"
            echo "| Initial state | ${initial_state} |"
            echo "| Final state | ${final_state} |"
            echo "| Public DNS | ${public_dns} |"
            echo "| Public IP | ${public_ip} |"
            echo
            echo "### SSH tunnel"
            echo
            echo '```bash'
            echo "ssh -i ~/.ssh/trustyclaw/stage_operator -o ExitOnForwardFailure=yes -N -L 7443:127.0.0.1:7443 -L 7445:127.0.0.1:7445 trustyclaw-operator@${public_dns}"
            echo '```'
            echo
            echo "Admin UI: http://127.0.0.1:7443"
          } >> "${GITHUB_STEP_SUMMARY}"
