<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Agent Chat</title>
<link rel="stylesheet" href="/admin_ui.css">
<link rel="stylesheet" href="agent_chat.css">
</head>
<body>
<div class="chat-app" id="chat-app">
  <button id="sidebar-backdrop" class="sidebar-backdrop" aria-label="Close thread list" hidden></button>
  <aside class="thread-pane" aria-label="Threads">
    <div class="pane-head">
      <span class="app-frame-title">Agent Chat</span>
      <button class="icon-button quiet" id="sidebar-close" aria-label="Close thread list">
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m6 6 8 8M14 6l-8 8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>
    <button id="new-thread" class="new-thread-button">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 4.5v11M4.5 10h11" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      New thread
    </button>
    <div id="threads" class="thread-list"></div>
  </aside>
  <main class="chat-main">
    <header class="chat-head">
      <button class="icon-button quiet" id="sidebar-open" aria-label="Show thread list">
        <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M4 6h12M4 10h12M4 14h12" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
      <div class="chat-head-title">
        <span class="thread-title" id="thread-title">New thread</span>
        <span class="thread-subtitle" id="thread-subtitle" hidden></span>
      </div>
      <button class="ghost sm" id="archive-thread" hidden>Archive</button>
    </header>
    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-column" id="thread-detail"></div>
    </div>
    <footer class="composer-dock">
      <div id="status" class="app-status" hidden></div>
      <div class="composer">
        <textarea id="new-task" rows="1" placeholder="Describe a task for the agent"></textarea>
        <div class="composer-bar">
          <div class="composer-options" id="composer-options">
            <input id="new-task-thread" class="composer-pill thread-input" value="main" placeholder="thread-name" aria-label="Thread name" spellcheck="false">
            <select id="new-task-runtime" class="composer-pill" aria-label="Runtime">
              <option value="codex">Codex</option>
              <option value="claude_code">Claude Code</option>
            </select>
            <select id="new-task-model" class="composer-pill" aria-label="Model"></select>
            <select id="new-task-effort" class="composer-pill" aria-label="Effort"></select>
          </div>
          <button class="send-button" id="create-task" aria-label="Send" title="Send (Enter)">
            <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M10 15.5v-11m0 0L5.5 9M10 4.5 14.5 9" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <p class="composer-hint">Enter to send &middot; Shift+Enter for a new line</p>
    </footer>
  </main>
</div>
<script src="agent_chat.js"></script>
</body>
</html>
